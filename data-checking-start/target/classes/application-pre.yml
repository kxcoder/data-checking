spring:
  datasource:
    url: jdbc:mysql://pre-mysql.example.com:3306/data_checking_pre?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: pre_user
    password: pre_pass
  kafka:
    bootstrap-servers: pre-kafka1.example.com:9092,pre-kafka2.example.com:9092,pre-kafka3.example.com:9092
  data:
    redis:
      host: pre-redis.example.com
      port: 6379
      password: ""

dubbo:
  registry:
    address: zookeeper://pre-zk1.example.com:2181,pre-zk2.example.com:2181,pre-zk3.example.com:2181
  provider:
    timeout: 5000

logging:
  level:
    com.example.datachecking: INFO
