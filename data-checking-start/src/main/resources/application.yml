server:
  port: 8080

spring:
  application:
    name: data-checking

dubbo:
  application:
    name: data-checking-provider
  protocol:
    name: dubbo
    port: 20880
  provider:
    timeout: 3000

sentinel:
  transport:
    dashboard: localhost:8080
  eager: true

logging:
  level:
    root: INFO
    com.example.datachecking: INFO
    com.alibaba.csp.sentinel: INFO
